<!DOCTYPE html>

<body>
    <header>
        

    </header>
    <div class="Form-box">
        <form class="Login-form">
            <h1 style="color: black;" style="    box-shadow: 10px 10px 20px rgb(0, 0, 0);" >Login</h1>
            <div class="input-box">
                <input type="text" required>
                <label>Email</label>
                <ion-icon name="mail-outline"></ion-icon>
            </div>
            <div class="input-box">
                <input type="password" required>
                <label>Senha</label>
                <ion-icon name="lock-closed-outline"></ion-icon>
            </div>
            <div class="checkbox">
                <span>
                    <input type="checkbox" id="login-checkbox">
                    <label for="login-checkbox" id="L" >Lembrar-me</label>
                </span>


                <h5>Esqueceu a senha?</h5>
            </div>
            <button type="submit" class="submit-btn" id="L" >Entrar</button>
            <h5 class="Register-btn" id="L" >Não tem uma conta? Registro</h5>
        </form>
        <form class="Register-form">
            <h1 style="color: black;" >Registro</h1>
            <div class="input-box">
                <input type="text" required>
                <label>Nome</label>
                <ion-icon name="person-outline"></ion-icon>
            </div>
            <div class="input-box">
                <input type="text" required>
                <label>Email</label>
                <ion-icon name="mail-outline"></ion-icon>
            </div>
            <div class="input-box">
                <input type="password" required>
                <label>Senha</label>
                <ion-icon name="lock-closed-outline"></ion-icon>
            </div>
            <div class="checkbox">
                <input type="checkbox" id="register-checkbox">
                <label for="register-checkbox">Concordo com os termos e condições</label>
            </div>
            <button type="submit" class="submit-btn">Entrar</button>
            <h5 class="Login-btn">Registre-se antes ? Login</h5>
        </form>
    </div>
